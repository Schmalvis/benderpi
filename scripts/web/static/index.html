<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BenderPi</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════
       Login Overlay
       ═══════════════════════════════════════════ -->
  <div id="login-overlay" class="login-overlay">
    <div class="login-card">
      <img src="/assets/bender.png" alt="Bender" class="login-avatar">
      <h1 class="login-title">BenderPi</h1>
      <p class="text-muted">Enter PIN to access the admin panel</p>
      <form id="login-form" class="login-form" autocomplete="off">
        <input
          id="pin-input"
          type="password"
          inputmode="numeric"
          pattern="[0-9]*"
          placeholder="PIN"
          maxlength="16"
          required
          autofocus
        >
        <button type="submit" class="btn btn-primary">Bite my shiny metal app</button>
      </form>
      <div id="login-error" class="login-error hidden"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       Main Application (hidden until login)
       ═══════════════════════════════════════════ -->
  <div id="app" class="app hidden">

    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <img src="/assets/bender.png" alt="Bender" class="header-avatar">
        <span class="header-title">BenderPi</span>
      </div>

      <nav class="tab-bar" role="tablist">
        <button class="tab-btn active" data-tab="puppet" role="tab" aria-selected="true">
          <span class="tab-icon">&#x1F3AD;</span>
          <span class="tab-label">Puppet</span>
        </button>
        <button class="tab-btn" data-tab="dashboard" role="tab" aria-selected="false">
          <span class="tab-icon">&#x1F4CA;</span>
          <span class="tab-label">Dashboard</span>
        </button>
        <button class="tab-btn" data-tab="logs" role="tab" aria-selected="false">
          <span class="tab-icon">&#x1F4DD;</span>
          <span class="tab-label">Logs</span>
        </button>
        <button class="tab-btn" data-tab="config" role="tab" aria-selected="false">
          <span class="tab-icon">&#x2699;</span>
          <span class="tab-label">Config</span>
        </button>
        <button class="tab-btn" data-tab="remote" role="tab" aria-selected="false">
          <span class="tab-icon">&#x1F4F1;</span>
          <span class="tab-label">Remote</span>
        </button>
      </nav>

      <div class="header-actions">
        <button id="theme-toggle" class="btn btn-icon" title="Toggle theme" aria-label="Toggle theme">
          <!-- Sun icon (shown in dark mode) -->
          <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <!-- Moon icon (shown in light mode) -->
          <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3
                     7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button id="logout-btn" class="btn btn-icon" title="Logout" aria-label="Logout">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Tab Panels -->
    <main class="main">
      <section id="panel-puppet" class="tab-panel active" role="tabpanel">
        <div class="panel-placeholder">
          <p class="text-muted">Puppet mode — coming soon</p>
        </div>
      </section>

      <section id="panel-dashboard" class="tab-panel" role="tabpanel">
        <div class="panel-placeholder">
          <p class="text-muted">Dashboard — coming soon</p>
        </div>
      </section>

      <section id="panel-logs" class="tab-panel" role="tabpanel">
        <div class="panel-placeholder">
          <p class="text-muted">Logs — coming soon</p>
        </div>
      </section>

      <section id="panel-config" class="tab-panel" role="tabpanel">
        <div class="panel-placeholder">
          <p class="text-muted">Config — coming soon</p>
        </div>
      </section>
      <section id="panel-remote" class="tab-panel" role="tabpanel">
        <!-- content injected by remote.js -->
      </section>
    </main>

  </div>

  <!-- Scripts -->
  <script src="/app.js"></script>
  <script src="/puppet.js"></script>
  <script src="/dashboard.js"></script>
  <script src="/logs.js"></script>
  <script src="/config.js"></script>
  <script src="/remote.js"></script>

</body>
</html>
