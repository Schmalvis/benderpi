<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BenderPi</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════
       Login Overlay (z-index: 500)
       ═══════════════════════════════════════════ -->
  <div id="login-overlay" class="login-overlay">
    <div class="login-card">
      <img src="/assets/bender.png" alt="Bender" class="login-avatar">
      <h1 class="login-title">BenderPi</h1>
      <p class="text-muted">Enter PIN to access the admin panel</p>
      <form id="login-form" class="login-form" autocomplete="off">
        <input
          id="pin-input"
          type="password"
          inputmode="numeric"
          pattern="[0-9]*"
          placeholder="PIN"
          maxlength="16"
          required
          autofocus
        >
        <button type="submit" class="btn btn-primary">Bite my shiny metal app</button>
      </form>
      <div id="login-error" class="login-error hidden"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       Main Application (hidden until login)
       ═══════════════════════════════════════════ -->
  <div id="app" class="app hidden">

    <!-- Sidebar (desktop, z-index: 10) -->
    <aside id="sidebar" class="sidebar">
      <!-- Volume -->
      <div class="sidebar-volume">
        <span class="sidebar-vol-icon">&#x1F50A;</span>
        <input id="sidebar-volume" type="range" min="0" max="100" value="80"
               class="sidebar-volume-slider" orient="vertical">
        <span id="sidebar-vol-label" class="sidebar-vol-label">80%</span>
      </div>

      <div class="sidebar-divider"></div>

      <!-- LED Listening toggle -->
      <button id="sidebar-led" class="sidebar-toggle" title="LED listening animations">
        <span class="sidebar-toggle-icon">&#x1F4A1;</span>
        LED
      </button>

      <!-- Puppet Only toggle -->
      <button id="sidebar-puppet" class="sidebar-toggle" title="Puppet-only mode (stops wake word)">
        <span class="sidebar-toggle-icon">&#x1F3AD;</span>
        Puppet
      </button>

      <!-- Silent Wake toggle -->
      <button id="sidebar-silent" class="sidebar-toggle" title="Silent wakeword (no chime)">
        <span class="sidebar-toggle-icon">&#x1F507;</span>
        Silent
      </button>

      <div class="sidebar-divider"></div>

      <!-- End Session (red, only visible when session active) -->
      <button id="sidebar-end-session" class="sidebar-end-session hidden" title="End current session">
        <span class="sidebar-toggle-icon">&#x23F9;</span>
        End
      </button>

      <!-- Service status -->
      <div class="sidebar-status">
        <div id="sidebar-status-dot" class="status-dot"></div>
        <span class="sidebar-status-label">SVC</span>
      </div>
    </aside>

    <!-- Content wrapper (right of sidebar) -->
    <div class="app-content">

      <!-- Header -->
      <header class="header">
        <div class="header-brand">
          <img src="/assets/bender.png" alt="Bender" class="header-avatar">
          <div class="header-title-group">
            <span class="header-title">BenderPi</span>
            <span id="header-subtitle" class="header-subtitle">Bending Unit 22 &mdash; Online</span>
          </div>
          <div id="header-status-dot" class="header-status-dot"></div>
        </div>

        <div class="header-actions">
          <button id="theme-toggle" class="btn btn-icon" title="Toggle theme" aria-label="Toggle theme">
            <!-- Sun icon (shown in dark mode) -->
            <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <!-- Moon icon (shown in light mode) -->
            <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3
                       7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <button id="logout-btn" class="btn btn-icon" title="Logout" aria-label="Logout">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Tab Bar -->
      <nav class="tab-bar" role="tablist">
        <button class="tab-btn active" data-tab="puppet" role="tab" aria-selected="true">
          <span class="tab-icon">&#x1F3AD;</span>
          <span class="tab-label">Puppet</span>
        </button>
        <button class="tab-btn" data-tab="dashboard" role="tab" aria-selected="false">
          <span class="tab-icon">&#x1F4CA;</span>
          <span class="tab-label">Dashboard</span>
        </button>
        <button class="tab-btn" data-tab="logs" role="tab" aria-selected="false">
          <span class="tab-icon">&#x1F4DD;</span>
          <span class="tab-label">Logs</span>
        </button>
        <button class="tab-btn" data-tab="config" role="tab" aria-selected="false">
          <span class="tab-icon">&#x2699;</span>
          <span class="tab-label">Config</span>
        </button>
        <button class="tab-btn" data-tab="remote" role="tab" aria-selected="false">
          <span class="tab-icon">&#x1F4F1;</span>
          <span class="tab-label">Remote</span>
        </button>
      </nav>

      <!-- Tab Panels -->
      <main class="main">
        <section id="panel-puppet" class="tab-panel active" role="tabpanel">
          <div class="panel-placeholder">
            <p class="text-muted">Puppet mode — loading...</p>
          </div>
        </section>

        <section id="panel-dashboard" class="tab-panel" role="tabpanel">
          <div class="panel-placeholder">
            <p class="text-muted">Dashboard — loading...</p>
          </div>
        </section>

        <section id="panel-logs" class="tab-panel" role="tabpanel">
          <div class="panel-placeholder">
            <p class="text-muted">Logs — loading...</p>
          </div>
        </section>

        <section id="panel-config" class="tab-panel" role="tabpanel">
          <div class="panel-placeholder">
            <p class="text-muted">Config — loading...</p>
          </div>
        </section>

        <section id="panel-remote" class="tab-panel" role="tabpanel">
          <!-- content injected by remote.js -->
        </section>
      </main>

      <!-- Footer (hidden on mobile) -->
      <footer class="footer">
        <div id="footer-quote" class="footer-quote"></div>
        <div class="footer-brand">BenderPi</div>
      </footer>

    </div><!-- /.app-content -->

    <!-- FAB — mobile only (z-index: 100) -->
    <button id="fab" class="fab" aria-label="Controls">&#x2699;</button>

    <!-- Bottom Sheet Backdrop (z-index: 200) -->
    <div id="bottom-sheet-backdrop" class="bottom-sheet-backdrop"></div>

    <!-- Bottom Sheet (z-index: 201) -->
    <div id="bottom-sheet" class="bottom-sheet">
      <div class="bottom-sheet-handle"></div>
      <div class="bottom-sheet-grid">
        <!-- Volume (full width) -->
        <div class="bottom-sheet-item bottom-sheet-volume">
          <span class="bottom-sheet-item-icon">&#x1F50A;</span>
          <input id="bs-volume" type="range" min="0" max="100" value="80">
          <span id="bs-vol-label" class="bottom-sheet-item-label">80%</span>
        </div>

        <!-- LED toggle -->
        <div class="bottom-sheet-item">
          <button id="bs-led" class="sidebar-toggle" title="LED listening animations">
            <span class="sidebar-toggle-icon">&#x1F4A1;</span>
            LED
          </button>
        </div>

        <!-- Puppet toggle -->
        <div class="bottom-sheet-item">
          <button id="bs-puppet" class="sidebar-toggle" title="Puppet-only mode">
            <span class="sidebar-toggle-icon">&#x1F3AD;</span>
            Puppet
          </button>
        </div>

        <!-- Silent toggle -->
        <div class="bottom-sheet-item">
          <button id="bs-silent" class="sidebar-toggle" title="Silent wakeword">
            <span class="sidebar-toggle-icon">&#x1F507;</span>
            Silent
          </button>
        </div>

        <!-- End Session -->
        <div id="bs-end-wrap" class="bottom-sheet-item hidden">
          <button id="bs-end-session" class="sidebar-end-session" title="End current session">
            <span class="sidebar-toggle-icon">&#x23F9;</span>
            End Session
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- Scripts -->
  <script src="/app.js"></script>
  <script src="/puppet.js"></script>
  <script src="/dashboard.js"></script>
  <script src="/logs.js"></script>
  <script src="/config.js"></script>
  <script src="/remote.js"></script>

</body>
</html>
